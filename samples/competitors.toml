[[competitors]]
name = "Splunk"
aliases = ["splunk"]
positioning = "Industry incumbent for SIEM; cost cliff at 10TB/day; opaque licensing."

[[competitors]]
name = "Datadog"
aliases = ["datadog", "datadog logs"]
positioning = "Observability suite; logs are an expensive add-on."

[[competitors]]
name = "Sumo Logic"
