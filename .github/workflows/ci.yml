# CI for PlausiDen-Salesman.
# Runs on the self-hosted runner pool (PlausiDen-Runner).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: cargo check + test
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain check
        run: rustc --version && cargo --version
      - name: cargo check --workspace
        run: cargo check --workspace --all-targets
      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

  detector_corpus:
    name: AI-detector regression corpus
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      # The corpus test is in salesman-detector/tests/corpus_test.rs
      # and asserts: human samples score low, AI samples score high.
      - name: cargo test -p salesman-detector
        run: cargo test -p salesman-detector --no-fail-fast

  template_bench:
    name: Template body_seed scoring
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI
        run: cargo build -p salesman-cli --bin salesman
      - name: Score every template
        run: |
          ./target/debug/salesman score --templates-dir templates/cold > template-scores.tsv
          cat template-scores.tsv
          # Hard fail any template body_seed that flags the detector
          # above 0.6 (would block real drafts from approval).
          if awk -F'\t' 'NR>1 && $3+0 >= 0.6 {print "FAIL: " $1; exit 1}' template-scores.tsv; then
            echo "all templates pass detector threshold"
          else
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: template-scores
          path: template-scores.tsv

  docs:
    name: docs sanity (key files exist + non-empty)
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: All authoritative docs present
        run: |
          for f in PLAN.md ROADMAP.md AUDIT.md FOSS_AUDIT.md HUMAN_IN_THE_LOOP.md OWNER_BLOCKERS.md docs/EMAIL_DELIVERABILITY.md docs/OPERATOR_HANDBOOK.md docs/DEPLOYMENT_GUIDE.md; do
            test -s "$f" || { echo "missing or empty: $f"; exit 1; }
          done
      - name: ADR template + at least 5 ADRs
        run: |
          test -s docs/decisions/0000-template.md
          n=$(ls docs/decisions/[0-9]*.md 2>/dev/null | grep -v 0000 | wc -l)
          test "$n" -ge 5 || { echo "expected >=5 ADRs, got $n"; exit 1; }

  shellcheck:
    name: shellcheck
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get -qq install -y shellcheck
      - name: lint scripts/
        run: shellcheck scripts/*.sh

  cli_help:
    name: CLI help smoke test (parse-only)
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI
        run: cargo build -p salesman-cli --bin salesman
      # Catches subcommand-definition breakage even when DB-touching
      # tests can't run on CI. Every reputation-critical command must
      # at least parse and render its own --help.
      - name: --help on critical commands
        run: |
          set -e
          ./target/debug/salesman --help
          ./target/debug/salesman doctor --help
          ./target/debug/salesman dns-check --help
          ./target/debug/salesman audit --help
          ./target/debug/salesman audit-chain --help
          ./target/debug/salesman whoami --help
          ./target/debug/salesman preflight --help
          ./target/debug/salesman send-pending --help
          ./target/debug/salesman costs --help
          ./target/debug/salesman suppressions --help
          ./target/debug/salesman suppressions list --help
          ./target/debug/salesman suppressions add --help
          ./target/debug/salesman suppressions remove --help
          ./target/debug/salesman suppressions export --help
          ./target/debug/salesman suppressions import --help
          ./target/debug/salesman suppressions count --help
          ./target/debug/salesman queue-clear --help
          ./target/debug/salesman approve-batch --help
